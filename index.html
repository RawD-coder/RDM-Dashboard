<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laporan Penjualan Toko Buku</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    body {
      background: #f4f7fc;
      margin: 20px;
    }
    .container {
      max-width: 1400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      color: #1e2b3c;
      border-bottom: 3px solid #2a7de1;
      padding-bottom: 10px;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px 0;
      align-items: center;
    }
    .filters label {
      font-weight: 600;
      color: #1e2b3c;
    }
    .filters select, .filters input {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      background: #eef3fa;
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .summary-item {
      flex: 1 1 150px;
    }
    .summary-item span {
      display: block;
      font-size: 13px;
      color: #3a4a5e;
    }
    .summary-item strong {
      font-size: 20px;
      color: #0b1a2e;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 12px;
      overflow-x: auto;
      display: block;
      white-space: nowrap;
    }
    th, td {
      border: 1px solid #d0dae8;
      padding: 8px 12px;
      text-align: right;
    }
    th {
      background: #1e2b3c;
      color: white;
      font-weight: 600;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    td:first-child, th:first-child {
      text-align: center;
      font-weight: 500;
    }
    td:nth-child(2), td:nth-child(3) {
      text-align: left;
    }
    tr:nth-child(even) {
      background: #f8faff;
    }
    tr:hover {
      background: #e3ecf9;
    }
    .total-row {
      background: #d9e4f0 !important;
      font-weight: 700;
    }
    .total-row td {
      border-top: 3px solid #1e2b3c;
    }
    .badge {
      background: #2a7de1;
      color: white;
      padding: 2px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: #555;
    }
    .error {
      color: #b00020;
      background: #ffe6e6;
      padding: 16px;
      border-radius: 10px;
    }
    @media (max-width: 600px) {
      .summary-item strong { font-size: 16px; }
      table { font-size: 12px; }
      td, th { padding: 5px 6px; }
    }
  </style>
</head>
<body>

<div class="container" id="app">
  <h1>📚 Laporan Penjualan Toko Buku</h1>

  <!-- Filter -->
  <div class="filters">
    <div>
      <label for="monthFilter">📅 Bulan: </label>
      <select id="monthFilter">
        <option value="all">Semua Bulan</option>
        <option value="JANUARY">Januari</option>
        <option value="FEBRUARY">Februari</option>
        <option value="MARCH">Maret</option>
        <option value="APRIL">April</option>
        <option value="MAY">Mei</option>
        <option value="JUNE">Juni</option>
        <option value="JULY">Juli</option>
        <option value="AUGUST">Agustus</option>
        <option value="SEPTEMBER">September</option>
        <option value="OCTOBER">Oktober</option>
        <option value="NOVEMBER">November</option>
        <option value="DECEMBER">Desember</option>
      </select>
    </div>
    <div>
      <label for="searchInput">🔍 Cari Judul / Kode: </label>
      <input type="text" id="searchInput" placeholder="contoh: MDP0037 atau Layangan" />
    </div>
    <div>
      <button id="refreshBtn" style="background:#1e2b3c; color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer;">⟳ Refresh</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary" id="summaryBox">
    <div class="summary-item"><span>📦 Total Qty Terjual</span><strong id="totalQty">0</strong></div>
    <div class="summary-item"><span>💰 Total Pendapatan</span><strong id="totalAmount">Rp 0</strong></div>
    <div class="summary-item"><span>📚 Jumlah Judul</span><strong id="totalTitles">0</strong></div>
  </div>

  <!-- Table -->
  <div style="overflow-x:auto;">
    <table>
      <thead id="tableHead">
        <tr>
          <th>No</th>
          <th>Kode</th>
          <th>Judul</th>
          <th>Bulan</th>
          <th>Qty</th>
          <th>Jumlah (Rp)</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" class="loading">⏳ Memuat data...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // ============================================================
  // KONFIGURASI: GANTI URL INI DENGAN LINK PUBLISHED GOOGLE SHEETS CSV
  // ============================================================
  const DATA_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT0x.../pub?output=csv';
  // Contoh format: https://docs.google.com/spreadsheets/d/1ABC123.../export?format=csv&gid=0

  // Jika ingin menggunakan file JSON statis, ganti dengan:
  // const DATA_URL = '/data/sales.json';

  let allRows = [];

  // ============================================================
  // AMBIL DATA DARI GOOGLE SHEETS (CSV)
  // ============================================================
  async function fetchData() {
    try {
      const response = await fetch(DATA_URL);
      if (!response.ok) throw new Error('Gagal mengambil data');
      const csvText = await response.text();
      const parsed = parseCSV(csvText);
      allRows = parsed;
      renderTable(allRows);
      updateSummary(allRows);
    } catch (err) {
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="6" class="error">❌ Error: ${err.message}. Pastikan URL Google Sheets benar dan di-publish.</td></tr>`;
      console.error(err);
    }
  }

  // ============================================================
  // PARSER CSV SEDERHANA (support koma, kutip)
  // ============================================================
  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
    if (lines.length < 3) return [];

    // Cari baris header (No, CODE, TITLE, JANUARY, ...)
    let headerIndex = -1;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].toLowerCase().includes('no') && lines[i].toLowerCase().includes('code') && lines[i].toLowerCase().includes('title')) {
        headerIndex = i;
        break;
      }
    }
    if (headerIndex === -1) return [];

    const headers = lines[headerIndex].split(',').map(h => h.trim());
    // Cari indeks kolom: No, CODE, TITLE, dan kolom Qty/Amount per bulan
    const noIdx = headers.indexOf('No');
    const codeIdx = headers.indexOf('CODE');
    const titleIdx = headers.indexOf('TITLE');

    // Kumpulkan pasangan (Qty, Amount) untuk setiap bulan
    // Format: JANUARY, FEBRUARY, ... diikuti Qty dan Amount
    const monthCols = {};
    let currentMonth = '';
    for (let i = 0; i < headers.length; i++) {
      const h = headers[i].toUpperCase();
      if (['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'].includes(h)) {
        currentMonth = h;
        monthCols[currentMonth] = { qtyIdx: i, amountIdx: i+1 };
      }
    }

    // Ambil data baris (mulai setelah header)
    const rows = [];
    for (let i = headerIndex + 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.trim());
      if (cols.length < 3) continue;
      const no = parseInt(cols[noIdx]) || 0;
      const code = cols[codeIdx] || '';
      const title = cols[titleIdx] || '';
      if (!code && !title) continue;

      // Ambil data per bulan
      for (const [month, idxs] of Object.entries(monthCols)) {
        const qty = parseFloat(cols[idxs.qtyIdx]) || 0;
        const amount = parseFloat(cols[idxs.amountIdx]) || 0;
        if (qty !== 0 || amount !== 0) {
          rows.push({
            no,
            code,
            title,
            month,
            qty,
            amount
          });
        }
      }
    }
    return rows;
  }

  // ============================================================
  // RENDER TABLE
  // ============================================================
  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    if (!data || data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px;">📭 Tidak ada data untuk filter ini</td></tr>`;
      return;
    }

    // Urutkan berdasarkan No, lalu bulan
    const sorted = [...data].sort((a,b) => a.no - b.no || a.month.localeCompare(b.month));

    let html = '';
    let runningNo = 1;
    for (const row of sorted) {
      const monthDisplay = row.month.charAt(0) + row.month.slice(1).toLowerCase();
      html += `<tr>
        <td>${runningNo++}</td>
        <td>${row.code}</td>
        <td>${row.title}</td>
        <td>${monthDisplay}</td>
        <td>${row.qty}</td>
        <td>${formatRupiah(row.amount)}</td>
      </tr>`;
    }
    tbody.innerHTML = html;
  }

  // ============================================================
  // UPDATE SUMMARY
  // ============================================================
  function updateSummary(data) {
    let totalQty = 0, totalAmount = 0;
    const uniqueTitles = new Set();
    for (const row of data) {
      totalQty += row.qty;
      totalAmount += row.amount;
      uniqueTitles.add(row.code);
    }
    document.getElementById('totalQty').textContent = totalQty;
    document.getElementById('totalAmount').textContent = formatRupiah(totalAmount);
    document.getElementById('totalTitles').textContent = uniqueTitles.size;
  }

  // ============================================================
  // FILTER
  // ============================================================
  function applyFilters() {
    const month = document.getElementById('monthFilter').value;
    const keyword = document.getElementById('searchInput').value.toLowerCase().trim();

    let filtered = allRows;
    if (month !== 'all') {
      filtered = filtered.filter(row => row.month === month);
    }
    if (keyword) {
      filtered = filtered.filter(row => 
        row.code.toLowerCase().includes(keyword) || 
        row.title.toLowerCase().includes(keyword)
      );
    }
    renderTable(filtered);
    updateSummary(filtered);
  }

  // ============================================================
  // FORMAT RUPIAH
  // ============================================================
  function formatRupiah(amount) {
    return 'Rp ' + Math.round(amount).toLocaleString('id-ID');
  }

  // ============================================================
  // EVENT LISTENER
  // ============================================================
  document.getElementById('monthFilter').addEventListener('change', applyFilters);
  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('refreshBtn').addEventListener('click', () => {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="6" class="loading">⏳ Memuat ulang...</td></tr>`;
    fetchData();
  });

  // ============================================================
  // START
  // ============================================================
  fetchData();
</script>

</body>
</html>
